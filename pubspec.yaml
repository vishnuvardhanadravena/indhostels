name: indhostels
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  dio: ^5.9.1
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  get: ^4.7.3
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.0.0
  fluttertoast: ^8.1.2
  equatable: ^2.0.8
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  image_picker: ^1.2.1
  flutter_svg: ^2.2.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  url_launcher: ^6.3.2
  razorpay_flutter: ^1.4.1
  permission_handler: ^12.0.1
  open_file: ^3.5.11
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/landing1.svg
    - assets/landing2.svg
    - assets/landing3.svg
    - assets/icons/
    - assets/logo.png
